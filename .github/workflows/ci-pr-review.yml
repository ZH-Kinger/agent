name: CI - Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

  workflow_call:
    inputs:
      language:
        description: 'Review 语言 (zh / en)'
        type: string
        default: zh
      max-diff-lines:
        description: 'diff 最大行数'
        type: number
        default: 800
    secrets:
      anthropic-api-key:
        required: true

jobs:
  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Claude PR Review
        uses: wuji-technology/.github/.github/actions/claude-review@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY || secrets.anthropic-api-key }}
          language: ${{ inputs.language || 'zh' }}
          max-diff-lines: ${{ inputs.max-diff-lines || 800 }}